# Tema: Tokyo Night (night) έΑΦ alinhado com nvim (tokyonight) e wezterm.
# Sobrescreve os nomes ANSI (blue/green/yellow/red) usados nos m├│dulos abaixo
# pelos hex exatos do Tokyo Night, ent├μo o prompt fica id├ςntico em qualquer terminal.
palette = "tokyonight"

[palettes.tokyonight]
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
yellow = "#e0af68"
orange = "#ff9e64"
red = "#f7768e"
purple = "#bb9af7"

